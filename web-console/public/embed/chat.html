<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaClaw Embed Chat</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fc;
      --panel: #ffffff;
      --line: #d9e1ee;
      --text: #10203a;
      --muted: #5f6f88;
      --brand: #1062d4;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .embed-shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 100% 0, #e7f0ff 0%, var(--bg) 45%);
    }
    .embed-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 10px;
      align-items: center;
      font-size: 12px;
    }
    .head-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .head-meta {
      color: var(--muted);
      white-space: nowrap;
    }
    .llm-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .llm-row select {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      height: 32px;
      padding: 0 8px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }
    .embed-log {
      padding: 12px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .bubble {
      border-radius: 10px;
      padding: 8px 10px;
      line-height: 1.4;
      max-width: 92%;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      align-self: flex-end;
      background: #1062d4;
      color: #fff;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: var(--panel);
      border: 1px solid var(--line);
    }
    .bubble.system {
      align-self: center;
      background: #eef3ff;
      color: var(--muted);
      font-size: 12px;
    }
    .embed-form {
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .embed-form textarea {
      resize: none;
      min-height: 54px;
      max-height: 200px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      color: inherit;
      background: #fff;
      outline: none;
    }
    .embed-form button {
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      background: var(--brand);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .embed-form button:disabled {
      opacity: 0.45;
      cursor: default;
    }
  </style>
</head>
<body>
<div class="embed-shell">
  <header class="embed-head">
    <div class="head-main">
      <strong>AI 会话</strong>
      <span id="statusLabel" class="head-meta">ready</span>
    </div>
    <span id="sessionLabel" class="head-meta">session: (new)</span>
    <div class="llm-row">
      <select id="agentSelect" title="选择Agent"></select>
      <select id="llmConfigSelect" title="选择LLM"></select>
      <select id="llmModelSelect" title="选择模型"></select>
    </div>
  </header>
  <main id="chatLog" class="embed-log"></main>
  <form id="chatForm" class="embed-form">
    <textarea id="chatInput" placeholder="输入消息后回车发送"></textarea>
    <button id="sendBtn" type="submit">发送</button>
  </form>
</div>
<script src="/embed/embed-chat.js"></script>
</body>
</html>
