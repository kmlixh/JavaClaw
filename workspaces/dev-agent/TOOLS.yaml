mode: allow-list
allow:
  - echo
  - artifact.save
  - artifact.markdown
  - artifact.word
  - artifact.excel
  - artifact.ppt
  - workspace.path
  - file.list
  - file.read
  - file.write
  - http.fetch
  - shell.exec
  - db.query
  - db.execute
  - db.schema.inspect
  - table.render
  - chart.echarts
  # 嵌入场景的浏览器回调通道(xmap-ol-front 这类宿主调用)
  - host.invoke
  # 计划工具(skill 强制 plan 流程时需要)
  - plan.create
  - plan.update
deny: []
