# nginx 配置 —— JavaClaw 部署在 http://10.173.108.120:8888/
#
# 拓扑:
#   客户端浏览器 ──▶ 10.173.108.120:8888 (nginx)
#                       ├── /            → 静态文件 (web-console SPA)
#                       ├── /api/*       → spring 8080
#                       ├── /oauth/*     → spring 8080
#                       ├── /ws/*        → spring 8080 (WebSocket upgrade)
#                       └── /embed/*     → spring 8080 (嵌入 SDK + iframe HTML)
#
# 前置:
#   1. spring boot 跑在同机 127.0.0.1:8080 (application.yml 已设 server.address=0.0.0.0
#      可监听全网卡;若 nginx 同机部署用 127.0.0.1 更安全)
#   2. web-console 已 `npm run build` 输出到 web-console/dist/
#   3. /data/javaClaw/web-console/ 软链或拷贝指向 web-console/dist/

server {
    listen      8888;
    server_name 10.173.108.120;

    # web-console 构建产物根目录。install.sh 把 dist/* 拷贝到这里,跟后端 jar
    # 同盘(/data 大容量)。nginx 用户(www-data / nginx)需要对此目录有 r+x 权限,
    # install.sh 已 chmod 0755/0644 处理好。
    root /data/javaClaw/web-console;
    index index.html;

    # 大请求 / 长上传(知识库导入、附件等)。
    # 1G 跟后端 ChatAttachmentUploadController.MAX_FILE_BYTES 对齐 —— 几百兆到 1GB 的
    # 工程方案 PDF 走 /api/chat/attachments 流式 transferTo,nginx 这一层不能卡死。
    client_max_body_size 1g;
    # 上传 1GB 文件浏览器/客户端可能要传 15-30 分钟,默认 client_body_timeout 60s 远远不够。
    client_body_timeout   1800s;
    # 默认 60s 太短,LLM 一轮可能跑几分钟;读超时尤其要长。
    proxy_read_timeout    3600s;
    proxy_send_timeout    600s;
    proxy_connect_timeout 30s;

    # ── 1) SSE 流(LLM 输出实时推送) ─────────────────────────────────
    # 必须放在通用 /api/ 之前,否则会被通用规则吞掉。SSE 不能 buffer,否则前端看到的
    # event 是一坨一坨而不是一条一条来,体验差且容易超时。
    location ~ ^/api/chat/stream {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        # SSE 长连接:1 小时上限,避免 LLM 跑超时被切;客户端会在 close 时自动重连。
        proxy_read_timeout 3600s;
    }

    # ── 2) WebSocket(/ws/chat 流式;/ws/bridge host.invoke 桥接) ────
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        # WebSocket 心跳:不能短于客户端期望;前端有 ping 就让它的间隔起作用即可。
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── 3) OAuth 端点(/oauth/authorize, /oauth/token) ─────────────
    # 第三方 SDK(如 xmap-ol-front)直连 /oauth/token 拿 access_token,需要走原始路径。
    location /oauth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
    }

    # ── 4) 嵌入资源(/embed/javaclaw-embed-sdk.js 等) ───────────────
    # EmbedStaticConfig.java 把这些静态资源也注册到 spring 上,从后端读 web-console/dist/embed/。
    # 也可以直接在 nginx 用 alias 替换为 root,但走后端方便统一改 SDK 时不用重启 nginx。
    location /embed/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SDK 改动频繁,上线前禁用浏览器缓存,运行稳定后再开
        add_header Cache-Control "no-cache" always;
    }

    # ── 5) 后端通用 API(覆盖前面没匹配到的所有 /api/*) ────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
    }

    # ── 6) SPA 静态 + history fallback ────────────────────────────
    # vue-router 的 /chat/xxx 等深链接刷新页面时,nginx 找不到对应文件 → 兜底返回 index.html
    # 让前端路由自己接管。打包资源(/assets/*) hash 化,可以长期缓存。
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1k;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_disable "msie6";

    # 安全头(基本款)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options "SAMEORIGIN" always;       # 嵌入用同源 iframe;若要跨域嵌入改成 ALLOW-FROM 或删掉
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # access log 默认就够,需要排查 SSE/WS 时去掉 buffer
    access_log /var/log/nginx/javaclaw-access.log;
    error_log  /var/log/nginx/javaclaw-error.log warn;
}
