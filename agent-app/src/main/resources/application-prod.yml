# 生产 profile —— 部署在 /data/javaClaw 下,启动用 --spring.profiles.active=prod
#
# 跟 dev 用的 application-postgres.yml 区别:
#   1. DB 凭据硬编码,不再读环境变量(部署 zip 不带 .env 文件)
#   2. 不带 agent.llm.* 段 —— LLM 完全走 DB 配置(llm_provider_config 表),
#      由 admin UI 维护;application.yml 默认 enabled=false,fallback 不会触发
#   3. flyway baseline 与现有 dev DB 兼容
#
# DB 密码进 jar 是明文 —— 这是部署模型的取舍。要换成更安全的方式可以:
#   --spring.config.additional-location=file:/data/javaClaw/  + 把同名外部 yaml
#   覆盖,或改回 ${DB_PASSWORD:...} 用 EnvironmentFile 注入。

spring:
  datasource:
    url: jdbc:postgresql://10.173.108.120:5433/java_claw
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: JL0Is1KqGuQMayeF
    hikari:
      connection-timeout: 10000
      validation-timeout: 5000
      max-lifetime: 240000
      keepalive-time: 60000
      minimum-idle: 2
  data:
    # Redis 用途:
    #   1) JwtService 把 HMAC 签名密钥(agent:auth:jwt:secret)落到 Redis,跨 JVM 重启 / 多实例
    #      部署都用同一份密钥,避免重启后旧 cookie 全失效让用户被强制重登
    #   2) (可选)agent.session-lock.type=redis 时 RedisSessionLockManager 用同一份连接做
    #      会话级互斥锁
    # 凭证写明文是为了和上面的 PostgreSQL 凭证保持同口径(都在 prod yml 里硬编码,部署 zip
    # 不带 .env)。要换成更安全的方式可以走环境变量 SPRING_DATA_REDIS_PASSWORD 覆盖。
    redis:
      host: 10.173.108.120
      port: 6379
      password: 9XLagGk4%V#MEcw4x
      timeout: 3s
      connect-timeout: 3s
      lettuce:
        pool:
          enabled: false
        shutdown-timeout: 100ms
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 9
    baseline-description: legacy-schema-baseline

agent:
  session-lock:
    type: in-memory
